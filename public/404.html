<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена — Жемчужина-Тараная</title>
  <meta name="robots" content="noindex,follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="booking-page">
  <header class="header header--compact">
    <div class="container header__inner">
      <a href="/" class="logo">
        <span class="logo__main">ЖЕМЧУЖИНА</span>
        <span class="logo__sub">ТАРАНАЯ · САХАЛИН</span>
      </a>
      <a href="/" class="btn btn--ghost">← На главную</a>
    </div>
  </header>

  <main class="booking-main">
    <div class="container container--narrow error-page">
      <p class="error-page__code">404</p>
      <h1 class="error-page__title">Страница потерялась в море</h1>
      <p class="error-page__lead">Такой страницы у нас нет — возможно, она была удалена или вы перешли по неверной ссылке.</p>
      <div class="error-page__actions">
        <a href="/" class="btn btn--book btn--lg">На главную</a>
        <a href="/booking.html" class="btn btn--ghost btn--lg">Забронировать</a>
      </div>
    </div>
  </main>

  <footer class="footer-ideadom">
    <div class="container footer-ideadom__inner">
      <span class="footer-ideadom__brand">Жемчужина-Тараная</span>
      <span><a href="/policy.html">Политика</a> · <a href="/">На главную</a></span>
    </div>
  </footer>
</body>
</html>
